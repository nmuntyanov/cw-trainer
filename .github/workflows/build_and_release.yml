name: Build and Release

on:
  push:
    tags:
      - 'v*'
  pull_request:
    branches: [ main ]

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          submodules: 'recursive'

      - name: Build with ESP-IDF
        uses: espressif/esp-idf-ci-action@v1
        with:
          esp_idf_version: v5.4.1
          target: esp32
          path: '.'

      - name: List Build Artifacts (Debug)
        run: |
          ls -R build/

      - name: Package Binaries
        if: startsWith(github.ref, 'refs/tags/v')
        run: |
          mkdir -p release_assets
          # Find and copy the main app, bootloader, and partition table
          find build -name "cw_trainer.bin" -exec cp {} release_assets/ \;
          find build -name "bootloader.bin" -exec cp {} release_assets/ \;
          find build -name "partition-table.bin" -exec cp {} release_assets/ \;
          
          # Optional: Create a merged binary (requires esptool, which is in the IDF image)
          # We'll do this in a separate step if needed, but for now let's just ensure we have the main files.

      - name: Create Release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: |
            release_assets/cw_trainer.bin
            release_assets/bootloader.bin
            release_assets/partition-table.bin
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
